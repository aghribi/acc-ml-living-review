name: Build and Deploy Site

# Single deploy path (replaces the former deploy.yml + rebuild.yml +
# sphinx.yml trio): builds Hugo and Sphinx fresh and publishes to gh-pages.
on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Update Living Review Data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # For workflow_run triggers, only deploy when the data update succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main            # workflow_run checks out the triggering sha by default
          persist-credentials: false

      # -------------------
      # Build Hugo site
      # -------------------
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.150.1'
          extended: true

      - name: Build Hugo
        run: hugo -s site --minify --baseURL "https://aghribi.github.io/acc-ml-living-review/"

      # -------------------
      # Build Sphinx docs (fresh — never from a committed build)
      # -------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sphinx dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e . --no-deps

      - name: Build Sphinx
        run: sphinx-build -b html docs/source docs/build/html

      - name: Collect outputs
        run: |
          mkdir -p site/public/docs
          cp -r docs/build/html/* site/public/docs/

      # -------------------
      # Deploy to gh-pages (SSH deploy key)
      # -------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./site/public
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
